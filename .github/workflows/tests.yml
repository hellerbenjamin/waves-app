name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  php:
    name: PHP tests (PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # gd: GenerateThumbnailTest decodes/encodes images. The test suite
          # runs against an in-memory sqlite DB (see phpunit.xml), so no DB
          # service is needed; sqlite/pdo_sqlite ship with the runner's PHP.
          extensions: gd, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  js:
    name: JS tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test
